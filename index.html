<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DES Protocol - Cyberpunk</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="scanlines"></div>
    <div class="container">
        <header>
            <h1 class="glitch" data-text="DES ENCRYPTION">DES ENCRYPTION</h1>
            <p class="subtitle">DATA ENCRYPTION STANDARD // TERMINAL</p>
        </header>

        <main>
            <div class="panel">
                <div class="panel-header">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="panel-title">SYSTEM.INPUT</span>
                </div>
                <div class="panel-body">
                    <div class="input-group">
                        <label for="key">SECRET KEY [8 CHARACTERS MAX/MIN]</label>
                        <input type="text" id="key" maxlength="8" placeholder="Enter exactly 8 chars..." autocomplete="off" />
                        <span id="key-counter">0/8</span>
                    </div>

                    <div class="input-group">
                        <label for="text">PAYLOAD DATA</label>
                        <textarea id="text" rows="5" placeholder="Enter text to encrypt or base64 to decrypt..."></textarea>
                    </div>

                    <div class="action-buttons">
                        <button id="btn-encrypt" class="cyber-btn primary">
                            <span class="btn-text">ENCRYPT</span>
                            <span class="btn-glitch"></span>
                        </button>
                        <button id="btn-decrypt" class="cyber-btn secondary">
                            <span class="btn-text">DECRYPT</span>
                            <span class="btn-glitch"></span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="panel output-panel">
                <div class="panel-header">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="panel-title">SYSTEM.OUTPUT</span>
                </div>
                <div class="panel-body">
                    <div id="error-message" class="error hidden"></div>
                    <textarea id="output" rows="5" readonly placeholder="Output will appear here..."></textarea>
                    <button id="btn-copy" class="cyber-btn tertiary">
                        <span class="btn-text">COPY TO CLIPBOARD</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="/script.js"></script>
</body>
</html>
